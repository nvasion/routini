# Production Docker Compose
#
# Usage:
#   cp .env.example .env   # fill in COOKIE_SECRET
#   docker compose up --build -d
#
# The client (nginx) listens on port 80 and reverse-proxies /api and
# /health to the server service.  The server is not exposed to the host
# directly — all external traffic enters through nginx.

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    # Only expose to the internal Docker network; nginx handles external traffic
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3001}"
      # Must match the public URL nginx is served from
      CLIENT_URL: "${CLIENT_URL:-http://localhost}"
      # Required: set a strong random string in your .env file
      COOKIE_SECRET: "${COOKIE_SECRET:?COOKIE_SECRET must be set in the environment or .env file}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
